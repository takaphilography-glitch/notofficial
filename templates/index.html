<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>横動画→縦動画 変換</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>横動画を縦動画に変換</h1>
      <p class="subtitle">ドラッグ&ドロップだけで、9:16縦動画 + 日本語字幕付き動画を生成します。</p>

      <section id="drop-zone" class="drop-zone" aria-label="動画アップロード">
        <input id="file-input" type="file" accept="video/*" hidden />
        <p class="drop-main">ここに動画をドロップ</p>
        <p class="drop-sub">またはクリックして選択</p>
      </section>
      <section class="option-row" aria-label="字幕設定">
        <label class="toggle">
          <input id="subtitle-toggle" type="checkbox" checked />
          <span>字幕を付ける</span>
        </label>
      </section>
      <section class="option-row" aria-label="変換方式設定">
        <label class="mode-label" for="convert-mode">変換方式</label>
        <select id="convert-mode" class="mode-select">
          <option value="crop">クロップして縦動画にする</option>
          <option value="blur" selected>クロップせずぼかしを入れて縦動画にする</option>
        </select>
      </section>
      <section class="option-row" aria-label="顔美化設定">
        <label class="toggle">
          <input id="beauty-toggle" type="checkbox" />
          <span>顔を自然に美化する（軽め）</span>
        </label>
      </section>

      <section class="status-panel">
        <p id="status" class="status idle">ファイル待機中</p>
        <a id="download-link" class="download-link hidden" href="#">縦動画をダウンロード</a>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
